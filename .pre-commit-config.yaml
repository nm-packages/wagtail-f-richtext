repos:
  - repo: https://github.com/jackdewinter/pymarkdown
    rev: v0.9.38
    hooks:
      - id: pymarkdown
        args:
          - --disable-rules
          - line-length
          - scan
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version.
    rev: v0.15.20
    hooks:
      # Run the linter.
      - id: ruff-check
        args: [ --fix ]
      # Run the formatter.
      - id: ruff-format